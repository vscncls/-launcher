[discord]
## Pass extra arguments to the Discord executable
## You can test this with `discord-launcher -v --skip-update --no-exec`
#extra_arguments = []
## If unprivileged user namespaces are disabled on your system, Discord's
## chrome-sandbox will fail because the launcher installs without root and
## can't set the setuid bit. Add --no-sandbox to work around it.
#extra_arguments = ["--no-sandbox"]
## On HiDPI displays you can force a scale factor
#extra_arguments = ["--force-device-scale-factor=2.0"]
## On wayland you might need
#extra_arguments = ["--enable-features=UseOzonePlatform", "--ozone-platform=wayland"]
## How often to try to resume the download until giving up (0 for unlimited)
#download_attempts = 5
